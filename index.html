<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Business Link Tree</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          media="print" onload="this.media='all'">
</head>
<body>
    <div class="container">
        <button id="mode-toggle" aria-label="Toggle Day/Night Mode">
            <i class="fas fa-sun"></i>
        </button>

        <main>
            <header class="profile-section">
                <img src="https://picsum.photos/200/200" alt="Profile Picture" class="profile-pic">
                
                <h1>My Business Name</h1>
                <p>Your one-stop source for all things awesome!</p>
            </header>

            <nav class="links-section">
                </nav>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
